name: Delinquent tax sale -> owner enrichment

# Task C: download the Delinquent Tax Sale List PDF, pull each address, look it
# up on the Trustee site to get the current owner, deliver to Telegram.
#
# On-demand only (the list changes slowly, and a run does ~140 address lookups).
# Trigger from the bot's button/command, or the Actions "Run workflow" button.

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Telegram chat to send results to (blank = all subscribers)"
        required: false
        default: ""
      max_rows:
        description: "Limit rows (for testing; blank = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (poppler for the PDF + requests + reportlab + google-auth)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install requests reportlab google-auth

      - name: Run the collector
        env:
          MAX_ROWS: ${{ github.event.inputs.max_rows }}
        run: python DelinquentTaxCollector.py

      - name: Make a neat PDF
        run: python tools/csv_to_pdf.py DelinquentTaxSale_Owners.csv DelinquentTaxSale_Owners.pdf "Delinquent Tax Sale + Owners"

      - name: Save the results as downloadable files
        uses: actions/upload-artifact@v4
        with:
          name: delinquent-tax-sale-owners
          path: |
            DelinquentTaxSale_Owners.pdf
            DelinquentTaxSale_Owners.csv

      - name: Send the results to Telegram (PDF + CSV)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: DelinquentTaxSale_Owners.pdf,DelinquentTaxSale_Owners.csv
        run: |
          COUNT=$(($(wc -l < DelinquentTaxSale_Owners.csv) - 1))
          CAPTION="💰 Delinquent tax sale + owners — $(date -u +%Y-%m-%d) — ${COUNT} properties" \
            python tools/notify.py

      - name: Append to the Google Sheet
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CSV: DelinquentTaxSale_Owners.csv
          TAB: "Tax Sale"
          KEY_COL: "5"          # Parcel (unique per property)
        run: python tools/to_sheet.py
