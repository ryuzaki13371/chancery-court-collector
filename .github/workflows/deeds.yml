name: Register of Deeds -> Affidavit names + addresses

# Task E (SAFE build): log into the Register of Deeds online search with Steven's
# OWN subscription, pull recent AFFIDAVIT party names + property addresses, deliver
# to Telegram + the sheet. Names/addresses ONLY -- it does NOT bulk-download PDFs
# (that's the account-suspension risk Steven flagged; he keeps PDFs manual).
#
# Steven's login comes from the BOT'S MEMORY: he saves it once in Telegram (the
# "🔑 Set up Deeds Login" button), the worker stores it, and this job fetches it
# from the worker's /creds endpoint. So NO password is ever typed into GitHub.
# Needs two repo secrets that point at the bot (set once by the developer):
#   WORKER_URL  e.g. https://lead-collector-bot.<subdomain>.workers.dev
#   DEEDS_KEY   the same random string set on the worker (protects /creds)
# (Fallback: if REGISTER_USER/REGISTER_PASS secrets are set, those win.)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Telegram chat to send results to"
        required: false
        default: ""
      days_back:
        description: "How many days back to search"
        required: false
        default: "30"
      fetch_pdfs:
        description: "Also download the document PDFs? 1 = yes (slower, higher risk), 0 = no"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Get Steven's saved login from the bot
        env:
          REGISTER_USER: ${{ secrets.REGISTER_USER }}
          REGISTER_PASS: ${{ secrets.REGISTER_PASS }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          DEEDS_KEY: ${{ secrets.DEEDS_KEY }}
        run: |
          set -e
          # Prefer repo secrets if present; otherwise pull from the bot's memory.
          if [ -n "$REGISTER_USER" ] && [ -n "$REGISTER_PASS" ]; then
            echo "Using REGISTER_USER/REGISTER_PASS repo secrets."
            echo "::add-mask::$REGISTER_USER"; echo "::add-mask::$REGISTER_PASS"
            echo "REGISTER_USER=$REGISTER_USER" >> "$GITHUB_ENV"
            echo "REGISTER_PASS=$REGISTER_PASS" >> "$GITHUB_ENV"
          elif [ -n "$WORKER_URL" ] && [ -n "$DEEDS_KEY" ]; then
            echo "Fetching saved login from the bot…"
            curl -s -H "X-Creds-Key: $DEEDS_KEY" "${WORKER_URL%/}/creds" -o creds.json
            U=$(python -c "import json;print(json.load(open('creds.json')).get('user',''))" 2>/dev/null || echo "")
            P=$(python -c "import json;print(json.load(open('creds.json')).get('pass',''))" 2>/dev/null || echo "")
            rm -f creds.json
            if [ -z "$U" ] || [ -z "$P" ]; then
              echo "No saved login yet."; exit 1
            fi
            echo "::add-mask::$U"; echo "::add-mask::$P"
            echo "REGISTER_USER=$U" >> "$GITHUB_ENV"
            echo "REGISTER_PASS=$P" >> "$GITHUB_ENV"
          else
            echo "No login source configured (need WORKER_URL+DEEDS_KEY, or REGISTER_* secrets)."; exit 1
          fi

      - name: Run the Register of Deeds collector (names + addresses, optional PDFs)
        env:
          DAYS_BACK: ${{ github.event.inputs.days_back }}
          FETCH_PDFS: ${{ github.event.inputs.fetch_pdfs }}
          SAVE_HTML: "1"
        run: python RegisterDeedsCollector.py

      - name: Zip the PDFs if any were downloaded
        if: success()
        id: zippdf
        run: |
          if [ -d deeds_pdfs ] && [ -n "$(ls -A deeds_pdfs 2>/dev/null)" ]; then
            zip -r -q RegisterDeeds_PDFs.zip deeds_pdfs
            echo "have_pdfs=1" >> "$GITHUB_OUTPUT"
            echo "Zipped $(ls deeds_pdfs | wc -l) PDF(s)."
          else
            echo "have_pdfs=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload calibration + results (so the parser can be finalized)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: register-deeds-debug
          path: |
            RegisterDeeds_Affidavits.csv
            RegisterDeeds_PDFs.zip
            search_page.html
            results_page.html
          if-no-files-found: ignore

      - name: Send results to Telegram (CSV, plus the PDF zip if any)
        if: success()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ROWS=$(($(wc -l < RegisterDeeds_Affidavits.csv) - 1))
          if [ "${{ steps.zippdf.outputs.have_pdfs }}" = "1" ]; then
            FILE="RegisterDeeds_Affidavits.csv,RegisterDeeds_PDFs.zip" \
            CAPTION="🏛️ Register of Deeds — ${ROWS} names + addresses, plus the document PDFs" \
              python tools/notify.py
          else
            FILE="RegisterDeeds_Affidavits.csv" \
            CAPTION="🏛️ Register of Deeds — recent affidavit names + addresses — ${ROWS} rows" \
              python tools/notify.py
          fi

      - name: Append to the Google Sheet ("Register of Deeds" tab)
        if: success()
        continue-on-error: true
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CSV: RegisterDeeds_Affidavits.csv
          TAB: "Register of Deeds"
          KEY_COL: "0"        # Name
        run: python tools/to_sheet.py

      - name: Make the sheet neat
        if: success()
        continue-on-error: true
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python tools/format_sheet.py

      - name: Tell the user if login/secrets are missing
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          if [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="🏛️ Couldn't sign in to the Register of Deeds. If you haven't yet, tap 🔑 Set up Deeds Login (or send /setup) to save your username + password — just once. Then tap 🏛️ again."
          fi
