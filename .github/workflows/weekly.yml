name: Weekly Chancery Court name collection

# Runs the collector automatically every Monday, and can also be run by hand
# from the Actions tab (the "Run workflow" button). No server / VPS needed —
# GitHub runs it for free in the cloud.

on:
  schedule:
    - cron: "0 11 * * 1"   # every Monday 11:00 UTC (~6 AM US Central)
  workflow_dispatch:        # manual run / triggered by the Telegram bot
    inputs:
      chat_id:
        description: "Telegram chat to send results to (blank = default)"
        required: false
        default: ""

permissions:
  contents: read           # data goes to Telegram only — nothing committed back

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (poppler for PDFs + requests + reportlab)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install requests reportlab

      - name: Run the collector
        run: python ChanceryCourtCollector.py

      - name: Make a neat PDF
        run: python tools/csv_to_pdf.py ChanceryCourt_Names.csv ChanceryCourt_Names.pdf "Chancery Court — Case Names"

      - name: Save the results as downloadable files
        uses: actions/upload-artifact@v4
        with:
          name: chancery-court-names
          path: |
            ChanceryCourt_Names.pdf
            ChanceryCourt_Names.csv

      - name: Send the results to Telegram (PDF + CSV)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}            # set = on-demand tap; blank = weekly -> all subscribers
          DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: ChanceryCourt_Names.pdf,ChanceryCourt_Names.csv
        run: |
          COUNT=$(($(wc -l < ChanceryCourt_Names.csv) - 1))
          CAPTION="📋 Chancery Court leads — $(date -u +%Y-%m-%d) — ${COUNT} names" \
            python tools/notify.py
