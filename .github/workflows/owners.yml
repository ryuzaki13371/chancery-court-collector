name: Address -> Owners + mailing address

# Task D: an uploaded list of property addresses -> owner names + MAILING addresses,
# delivered back to the chat in the mail-campaign CSV format.
#
# Triggered by the bot (Cloudflare Worker) when a user uploads a .csv/.txt file:
# the Worker passes the Telegram file_id + chat_id here.

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Telegram chat to send results to"
        required: true
      file_id:
        description: "Telegram file_id of the uploaded address list"
        required: true
      file_name:
        description: "original file name (informational)"
        required: false
        default: "addresses.csv"

permissions:
  contents: read

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Download the uploaded address file from Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          FILE_ID: ${{ github.event.inputs.file_id }}
        run: |
          set -e
          curl -s "https://api.telegram.org/bot$BOT_TOKEN/getFile?file_id=$FILE_ID" -o getfile.json
          FILE_PATH=$(python -c "import json; print(json.load(open('getfile.json'))['result']['file_path'])")
          curl -s -o input_addresses.csv "https://api.telegram.org/file/bot$BOT_TOKEN/$FILE_PATH"
          echo "First lines of the uploaded file:"; head -5 input_addresses.csv

      - name: Run the owner lookup
        run: python OwnerLookupCollector.py input_addresses.csv

      - name: Send the results back to Telegram (campaign + full review)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          FILE: "OwnerLeads_Campaign.csv,OwnerLeads_Full.csv"
        run: |
          ROWS=$(($(wc -l < OwnerLeads_Campaign.csv) - 1))
          CAPTION="🔎 Owners + mailing addresses — ${ROWS} rows (campaign format). The Full file adds property address / parcel / status." \
            python tools/notify.py

      - name: Append to the Google Sheet ("Owners" tab)
        continue-on-error: true        # never let a sheet hiccup block the Telegram delivery
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CSV: OwnerLeads_Sheet.csv
          TAB: "Owners"
          KEY_COL: "10"                 # the trailing Key column (unique per address+owner)
        run: |
          # Build a neat, reordered copy for the sheet: one Address column, split
          # city/state/zip, with the dedup Key tucked at the far right.
          python - <<'PY'
          import csv, re
          rows = list(csv.reader(open("OwnerLeads_Full.csv", encoding="utf-8")))
          out = [["Address", "Owner", "LastName", "FirstName", "MiddleName",
                  "Mailing Street", "City", "State", "Zip", "Status", "Key"]]
          for r in rows[1:]:
              if len(r) < 10:
                  continue
              addr = (r[1] or r[0]).strip()          # county address, else what was uploaded
              csz = r[7].strip()                     # e.g. "Naples FL 34113"
              city = state = zipc = ""
              m = re.search(r"(\d{5}(?:-\d{4})?)\s*$", csz)
              if m:
                  zipc = m.group(1); csz = csz[:m.start()].strip()
              toks = csz.split()
              if toks and len(toks[-1]) == 2 and toks[-1].isalpha():
                  state = toks[-1]; city = " ".join(toks[:-1])
              else:
                  city = csz
              key = f"{r[0]}|{r[3]} {r[4]} {r[5]}".strip()
              out.append([addr, r[2], r[3], r[4], r[5], r[6], city, state, zipc, r[9], key])
          csv.writer(open("OwnerLeads_Sheet.csv", "w", newline="", encoding="utf-8")).writerows(out)
          print("sheet rows:", len(out) - 1)
          PY
          python tools/to_sheet.py

      - name: Make the sheet neat (bold header, freeze, auto-width, filter)
        continue-on-error: true
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python tools/format_sheet.py

      - name: Tell the user if it failed
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d text="⚠️ The owner lookup hit a snag. Make sure the file has one property address per line (or an Address column) and try again."
