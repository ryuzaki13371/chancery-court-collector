name: Weekly obituary -> property address collection

# Task A: scrape obituaries, look up each on the Hamilton County Trustee site,
# grab the property address, deliver to Telegram. Free, in GitHub's cloud.

on:
  schedule:
    - cron: "0 11 * * 1"   # every Monday 11:00 UTC (~6 AM US Central)
  workflow_dispatch:        # manual run / triggered by the Telegram bot
    inputs:
      chat_id:
        description: "Telegram chat to send results to (blank = default)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests reportlab google-auth

      - name: Run the collector
        run: python ObituaryPropertyCollector.py

      - name: Make a neat PDF
        run: python tools/csv_to_pdf.py Obituary_Addresses.csv Obituary_Addresses.pdf "Obituaries → Property Addresses"

      - name: Save the results as downloadable files
        uses: actions/upload-artifact@v4
        with:
          name: obituary-addresses
          path: |
            Obituary_Addresses.pdf
            Obituary_Addresses.csv

      - name: Send the results to Telegram (PDF + CSV)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}            # set = on-demand tap; blank = weekly -> all subscribers
          DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: Obituary_Addresses.pdf,Obituary_Addresses.csv
        run: |
          COUNT=$(($(wc -l < Obituary_Addresses.csv) - 1))
          CAPTION="🏠 Obituary → address leads — $(date -u +%Y-%m-%d) — ${COUNT} names" \
            python tools/notify.py

      - name: Append to the Google Sheet
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CSV: Obituary_Addresses.csv
          TAB: "Obituaries"
          KEY_COL: "7"          # Source Link (unique per obituary)
        run: python tools/to_sheet.py
