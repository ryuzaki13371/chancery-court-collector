name: Weekly obituary -> property address collection

# Task A: scrape obituaries, look up each on the Hamilton County Trustee site,
# grab the property address, deliver to Telegram. Free, in GitHub's cloud.

on:
  schedule:
    - cron: "0 11 * * 1"   # every Monday 11:00 UTC (~6 AM US Central)
  workflow_dispatch:        # manual run / triggered by the Telegram bot
    inputs:
      chat_id:
        description: "Telegram chat to send results to (blank = default)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run the collector
        run: python ObituaryPropertyCollector.py

      - name: Save the result as a downloadable file
        uses: actions/upload-artifact@v4
        with:
          name: obituary-addresses
          path: Obituary_Addresses.csv

      - name: Send the results to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}            # set = on-demand tap; blank = weekly -> all subscribers
          DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: Obituary_Addresses.csv
        run: |
          COUNT=$(($(wc -l < Obituary_Addresses.csv) - 1))
          CAPTION="🏠 Obituary → address leads — $(date -u +%Y-%m-%d) — ${COUNT} names" \
            python tools/notify.py

      - name: Commit the updated results back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Obituary_Addresses.csv
          git diff --staged --quiet || git commit -m "Update obituary addresses ($(date -u +%Y-%m-%d))"
          git push
